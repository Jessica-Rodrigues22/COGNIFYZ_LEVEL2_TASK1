<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cognifyz Level 2 Task 1</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }

        h1 {
            color: #0d6efd;
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .card img {
            height: 250px;
            object-fit: cover;
        }

        .skill-box {
            padding: 30px;
            color: white;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- Heading -->
    <div class="container mt-5">
        <h1 class="text-center mb-5">
            Cognifyz Level 2 - Task 1
        </h1>

        <!-- Responsive Card -->
        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg">

                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800"
                        class="card-img-top" alt="Student">

                    <div class="card-body text-center">

                        <h3 class="card-title">
                            Jessica Portfolio
                        </h3>

                        <p class="card-text">
                            MCA Student | Web Developer | HTML, CSS, JavaScript
                        </p>

                        <button class="btn btn-primary">
                            Read More
                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- Grid Layout -->
        <div class="mt-5">

            <h2 class="text-center mb-4">
                Responsive Grid Layout
            </h2>

            <div class="row g-4">

                <div class="col-md-4 col-sm-6">
                    <div class="skill-box bg-primary">
                        HTML
                    </div>
                </div>

                <div class="col-md-4 col-sm-6">
                    <div class="skill-box bg-success">
                        CSS
                    </div>
                </div>

                <div class="col-md-4 col-sm-12">
                    <div class="skill-box bg-danger">
                        JavaScript
                    </div>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
